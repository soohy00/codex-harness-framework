name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python3 -m unittest scripts.test_execute scripts.test_install_codex_skills scripts.test_skill_metadata scripts.test_phase_template scripts.test_repo_hygiene -v

      - name: Run syntax checks
        run: PYTHONPYCACHEPREFIX=/tmp/codex-pycache python3 -m py_compile scripts/execute.py scripts/test_execute.py scripts/install_codex_skills.py scripts/test_install_codex_skills.py scripts/test_skill_metadata.py scripts/test_phase_template.py scripts/test_repo_hygiene.py
